<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b5fff" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <title>Katy ISD Password Reset</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f2f2f2; }
    .wrap { max-width: 680px; margin: 40px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 16px; padding: 18px; box-shadow: 0 6px 24px rgba(0,0,0,.08); }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 14px; color:#333; line-height: 1.35; }
    a.btn { display:inline-block; background:#0b5fff; color:#fff; text-decoration:none; padding: 12px 14px; border-radius: 12px; font-weight: 700; }
    .small { margin-top: 10px; font-size: 12px; color:#666; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Katy ISD Password Reset</h1>
      <p>Tap the button to open the password reset site.</p>

      <!-- CHANGE THIS URL to your real reset URL -->
     <a class="btn" href="https://REAL-RESET-URL-HERE" rel="noopener">Open Reset Site</a>

      <div class="small" id="installStatus">Install status: checking…</div>
    </div>
  </div>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js")
      .then(function () {
        document.getElementById("installStatus").textContent =
          "Install status: service worker active";
      })
      .catch(function () {
        document.getElementById("installStatus").textContent =
          "Install status: service worker failed";
      });
  });
}
</script>
</body>
</html>
